<div class="card shadow p-4 mb-4" style="border-radius: 15px;">
  <h4 class="text-center mb-4">📋 قائمة التجار</h4>

  <table class="table table-striped table-bordered text-center">
    <thead class="thead-dark">
      <tr>
        <th>الكود</th>
        <th>اسم التاجر</th>
        <th>#</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let trader of Merchants">
        <td>{{ trader.merchantCode }}</td>
        <td>{{ trader.merchantName }}</td>
        <td>{{ trader.merchantId }}</td>
      </tr>
    </tbody>
  </table>

<div *ngIf="Merchants.length === 0" class="alert alert-info text-center mt-3">
  لا يوجد تجار حالياً.
</div>

</div>
