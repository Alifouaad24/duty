<div class="card shadow p-4 mb-4" style="border-radius: 15px; max-width: 500px; margin: auto;">
  <h4 class="text-center mb-4">🧾 إضافة تاجر</h4>
  
  <div class="form-group">
    <label>اسم التاجر</label>
    <input type="text" class="form-control" [(ngModel)]="merchantName">
  </div>
  
  
  <div class="form-group mt-3">
    <label>كود التاجر</label>
    <input type="text" class="form-control" [(ngModel)]="merchantCode">
  </div>
  
  <div class="text-center mt-4">
    <button class="btn btn-primary px-4" (click)="AddMerchant()"> حفظ</button>
  </div>
</div>
